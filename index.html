<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>🏠 家里的小东西 - 收纳地图</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      background: #f5f0e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* 登录遮罩 */
    .login-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }
    .login-box {
      background: #fffef9;
      border-radius: 24px;
      padding: 36px 30px;
      width: 360px;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
    .login-box h2 {
      font-size: 1.6rem;
      color: #5e4b3c;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .login-box .subtitle {
      font-size: 0.85rem;
      color: #9b8b75;
      margin-bottom: 22px;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #d9cdb3;
      border-radius: 30px;
      font-size: 1rem;
      text-align: center;
      outline: none;
      background: #fdfaf3;
      color: #4d3e2f;
      letter-spacing: 4px;
    }
    .login-box input:focus {
      border-color: #b8a07a;
    }
    .login-box button {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      border: none;
      border-radius: 30px;
      background: #c9af86;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      transition: 0.2s;
    }
    .login-box button:hover {
      background: #b59763;
    }
    .login-box .error-msg {
      color: #e0795c;
      font-size: 0.8rem;
      margin-top: 10px;
      display: none;
    }
    .login-box .sync-status {
      font-size: 0.75rem;
      color: #9b8b75;
      margin-top: 14px;
    }

    /* 顶部导航栏 */
    .top-bar {
      background: #fffef9;
      border-bottom: 2px solid #e0d6c2;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      z-index: 20;
      flex-wrap: wrap;
    }
    .top-bar .home-icon { font-size: 1.4rem; }
    .floor-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .floor-tab {
      padding: 7px 16px;
      border-radius: 22px;
      border: 1px solid #d9cdb3;
      background: #fdfaf3;
      cursor: pointer;
      font-weight: 500;
      color: #5e4b3c;
      font-size: 0.85rem;
      white-space: nowrap;
      transition: 0.2s;
    }
    .floor-tab:hover { background: #ebe3d3; }
    .floor-tab.active { background: #c9af86; border-color: #b8a07a; color: white; font-weight: bold; }
    .top-actions { display: flex; gap: 6px; margin-left: auto; align-items: center; }
    .btn-xs {
      background: #fdfaf3;
      border: 1px solid #d9cdb3;
      padding: 5px 10px;
      border-radius: 18px;
      font-size: 0.7rem;
      cursor: pointer;
      color: #5e4b3c;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn-xs:hover { background: #ebe3d3; }
    .sync-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      margin-left: 4px;
      display: inline-block;
    }
    .sync-dot.saving { background: #ff9800; animation: pulse 0.8s infinite; }
    .sync-dot.error { background: #e0795c; }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* 房间标签栏 */
    .room-bar {
      background: #faf7f0;
      border-bottom: 1px solid #e8dfcf;
      padding: 6px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .room-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #d9cdb3;
      background: #fdfaf3;
      cursor: pointer;
      font-size: 0.8rem;
      color: #5e4b3c;
      transition: 0.2s;
      white-space: nowrap;
    }
    .room-tab:hover { background: #ebe3d3; }
    .room-tab.active { background: #b8a07a; border-color: #9c8560; color: white; font-weight: 600; }

    /* 主体 */
    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* 左侧面板 */
    .side-panel {
      width: 370px;
      min-width: 300px;
      background: #fffef9;
      border-right: 2px solid #e0d6c2;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    .panel-tabs {
      display: flex;
      border-bottom: 2px solid #e0d6c2;
      flex-shrink: 0;
    }
    .panel-tab {
      flex: 1;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
      color: #9b8b75;
      background: #faf7f0;
      border-bottom: 3px solid transparent;
      font-size: 0.85rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .panel-tab:hover { background: #f0eadb; color: #5e4b3c; }
    .panel-tab.active { background: #fffef9; color: #5e4b3c; border-bottom-color: #c9af86; }
    .panel-tab .badge {
      background: #e0795c;
      color: white;
      font-size: 0.65rem;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      min-width: 18px;
      text-align: center;
    }
    .panel-tab .badge:empty { display: none; }

    .panel-header {
      padding: 14px 14px 10px;
      border-bottom: 1px solid #e8dfcf;
      flex-shrink: 0;
    }
    .search-box { display: flex; gap: 6px; margin-bottom: 8px; }
    .search-box input {
      flex: 1;
      padding: 8px 11px;
      border: 1px solid #d9cdb3;
      border-radius: 22px;
      background: #fdfaf3;
      font-size: 0.85rem;
      outline: none;
      color: #4d3e2f;
    }
    .search-box input:focus { border-color: #b8a07a; }
    .search-box button {
      background: #b8a07a;
      border: none;
      color: white;
      padding: 0 14px;
      border-radius: 22px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .search-box button:hover { background: #9c8560; }
    .panel-actions { display: flex; gap: 5px; flex-wrap: wrap; }
    .btn {
      background: #fdfaf3;
      border: 1px solid #d9cdb3;
      padding: 6px 11px;
      border-radius: 18px;
      font-size: 0.75rem;
      cursor: pointer;
      color: #5e4b3c;
      transition: 0.2s;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .btn:hover { background: #ebe3d3; }
    .btn.primary { background: #c9af86; border-color: #b8a07a; color: white; font-weight: bold; }
    .btn.primary:hover { background: #b59763; }
    .btn.accent { background: #e0795c; border-color: #d0684a; color: white; }
    .btn.accent:hover { background: #c96a4e; }

    .item-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 16px;
      background: #faf7f0;
    }
    .empty-state { text-align: center; color: #b9a98b; margin-top: 45px; font-style: italic; line-height: 1.8; }
    .drawer-title {
      font-size: 1rem;
      font-weight: 600;
      color: #5e4b3c;
      margin-bottom: 10px;
      padding-bottom: 7px;
      border-bottom: 2px dashed #d9cdb3;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }
    .drawer-color-dot { width: 13px; height: 13px; border-radius: 3px; display: inline-block; flex-shrink: 0; }
    .drawer-path { font-size: 0.7rem; color: #9b8b75; font-weight: normal; margin-left: auto; }

    .layer-tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .layer-tab {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid #d9cdb3;
      background: #fdfaf3;
      cursor: pointer;
      font-size: 0.75rem;
      color: #5e4b3c;
      transition: 0.2s;
      white-space: nowrap;
    }
    .layer-tab:hover { background: #e8dfcf; }
    .layer-tab.active { background: #b8a07a; border-color: #9c8560; color: white; font-weight: 600; }
    .layer-tab .item-count { font-weight: normal; opacity: 0.8; font-size: 0.65rem; margin-left: 3px; }

    .item-card {
      background: white;
      border-radius: 11px;
      padding: 10px;
      margin-bottom: 7px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
      display: flex;
      gap: 9px;
      align-items: center;
      border: 1px solid #ede3d1;
      transition: 0.2s;
    }
    .item-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.04); border-color: #c9af86; }
    .item-card.pending { border-left: 4px solid #e0795c; background: #fffaf7; }
    .item-img {
      width: 44px; height: 44px;
      border-radius: 7px;
      object-fit: cover;
      background: #f5f0e8;
      flex-shrink: 0;
      border: 1px solid #ddd2be;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbb99b;
      font-size: 1.3rem;
      overflow: hidden;
    }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; color: #4d3e2f; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-note { font-size: 0.7rem; color: #9b8b75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-actions { display: flex; gap: 3px; flex-shrink: 0; }
    .icon-btn {
      background: none; border: none; font-size: 0.9rem; cursor: pointer;
      padding: 3px 5px; border-radius: 5px; color: #9b8b75; transition: 0.2s;
    }
    .icon-btn:hover { background: #f0e8d9; color: #c0392b; }
    .icon-btn.assign-btn { color: #e0795c; font-weight: bold; font-size: 1.1rem; }
    .icon-btn.assign-btn:hover { background: #fce8e0; color: #c96040; }

    .add-item-form {
      margin-top: 12px;
      background: #f8f4ea;
      padding: 11px;
      border-radius: 13px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .add-item-form input {
      padding: 8px;
      border: 1px solid #d9cdb3;
      border-radius: 7px;
      font-size: 0.8rem;
      background: white;
      outline: none;
    }
    .form-row { display: flex; gap: 5px; align-items: center; }

    /* 分配弹窗 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: #fffef9; border-radius: 18px; padding: 26px;
      width: 400px; max-width: 90vw; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 1.1rem; color: #5e4b3c; margin-bottom: 16px; }
    .modal select {
      width: 100%; padding: 9px; border: 1px solid #d9cdb3;
      border-radius: 9px; font-size: 0.85rem; margin-bottom: 8px;
      background: white; color: #4d3e2f; outline: none;
    }
    .modal select:focus { border-color: #b8a07a; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 14px; }
    .modal-actions .btn { padding: 9px 18px; font-size: 0.85rem; }

    /* 画布 */
    .canvas-area {
      flex: 1;
      position: relative;
      background: #f9f6ef;
      background-image: radial-gradient(circle, #e8dfcf 1px, transparent 1px);
      background-size: 26px 26px;
      overflow: auto;
      cursor: default;
    }
    .canvas-inner {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 900px;
      min-height: 650px;
    }
    .furniture {
      position: absolute;
      border-radius: 10px;
      background: #fdfaf5;
      border: 2px solid #cbb99b;
      box-shadow: 0 5px 14px rgba(0,0,0,0.05);
      cursor: pointer;
      transition: box-shadow 0.25s, border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 70px;
      min-height: 50px;
    }
    .furniture:hover { box-shadow: 0 8px 22px rgba(0,0,0,0.1); border-color: #b8a07a; }
    .furniture.open {
      border-color: #d4a373;
      box-shadow: 0 10px 26px rgba(180, 120, 60, 0.25);
      background: #fff8f0;
      z-index: 5;
    }
    .furniture-header {
      background: inherit;
      padding: 7px 9px;
      font-weight: 600;
      color: #5e4b3c;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      cursor: grab;
      flex-shrink: 0;
    }
    .furniture-header:active { cursor: grabbing; }
    .furniture-body {
      flex: 1;
      background: #f4efe3;
      transition: max-height 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.1);
      max-height: 0px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0;
    }
    .furniture.open .furniture-body { max-height: 200px; padding: 3px; }
    .furniture-layer-indicator {
      height: 16px;
      background: #e8dfcf;
      border-radius: 2px;
      margin: 1px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      color: #9b8b75;
      transition: 0.2s;
    }
    .furniture.open .furniture-layer-indicator { background: #d4c8b0; color: #6b5d4a; }
    .drawer-handle { font-size: 0.9rem; color: #b8a07a; margin-left: 5px; }
    .color-dot-sm {
      display: inline-block; width: 9px; height: 9px;
      border-radius: 2px; margin-right: 4px; border: 1px solid rgba(0,0,0,0.1);
    }
    .delete-furniture {
      background: none; border: none; color: #cbb99b;
      cursor: pointer; font-size: 0.8rem; padding: 0 2px; opacity: 0.5;
    }
    .delete-furniture:hover { color: #c0392b; opacity: 1; }
    .resize-handle {
      position: absolute;
      bottom: 2px; right: 2px;
      width: 14px; height: 14px;
      background: #cbb99b;
      border-radius: 3px;
      cursor: nwse-resize;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .furniture:hover .resize-handle,
    .furniture.open .resize-handle { opacity: 0.7; }
    .resize-handle:hover { opacity: 1; background: #b8a07a; }

    .context-hint {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: rgba(94,75,60,0.8);
      color: #fdfaf3;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.7rem;
      backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 30;
    }

    @media (max-width: 768px) {
      .main-area { flex-direction: column; }
      .side-panel { width: 100%; max-height: 40vh; min-width: auto; }
    }
  </style>
</head>
<body>

  <!-- 登录遮罩 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <h2>🏠 家里的小东西</h2>
      <div class="subtitle">输入密码查看收纳地图</div>
      <input type="password" id="passwordInput" placeholder="请输入密码" autofocus />
      <button id="loginBtn">🔑 进入</button>
      <div class="error-msg" id="loginError">密码错误，请重试</div>
      <div class="sync-status" id="loginStatus"></div>
    </div>
  </div>

  <!-- 顶部导航栏 -->
  <div class="top-bar" id="topBar" style="display:none;">
    <span class="home-icon">🏠</span>
    <div class="floor-tabs" id="floorTabs"></div>
    <div class="top-actions">
      <span id="syncIndicator" style="font-size:0.7rem;color:#9b8b75;display:flex;align-items:center;gap:4px;">
        已同步<span class="sync-dot" id="syncDot"></span>
      </span>
      <button class="btn-xs" id="addFloorBtn">➕ 楼层</button>
      <button class="btn-xs" id="exportBtn">📤 导出</button>
      <button class="btn-xs" id="importBtn">📥 导入</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
  </div>

  <!-- 房间标签栏 -->
  <div class="room-bar" id="roomBar" style="display:none;">
    <span style="font-size:0.8rem;color:#9b8b75;">📍 房间：</span>
  </div>

  <!-- 主体 -->
  <div class="main-area" id="mainArea" style="display:none;">
    <div class="side-panel">
      <div class="panel-tabs">
        <div class="panel-tab active" data-panel="items">📋 物品清单</div>
        <div class="panel-tab" data-panel="pending">📥 待处理<span class="badge" id="pendingBadge"></span></div>
      </div>
      <div class="panel-header">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="全局搜索..." />
          <button id="searchBtn">🔍</button>
        </div>
        <div class="panel-actions" id="panelActionsItems">
          <button class="btn primary" id="addFurnitureBtn">➕ 添加柜子</button>
        </div>
        <div class="panel-actions" id="panelActionsPending" style="display:none;">
          <button class="btn accent" id="addPendingBtn">➕ 添加待处理</button>
        </div>
      </div>
      <div class="item-list-container" id="itemListContainer">
        <div class="empty-state">🪑 点击柜子查看物品</div>
      </div>
    </div>
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-inner" id="canvasInner"></div>
    </div>
  </div>
  <div class="context-hint" id="contextHint" style="display:none;">✨ 拖动移动 | 右下角拖拽调大小 | 双击编辑 | 点击查看物品</div>

  <!-- 分配弹窗 -->
  <div class="modal-overlay" id="assignModal" style="display:none;">
    <div class="modal">
      <h3>📦 分配此物品到...</h3>
      <select id="assignFloor"></select>
      <select id="assignRoom"></select>
      <select id="assignFurniture"></select>
      <select id="assignLayer"></select>
      <div class="modal-actions">
        <button class="btn" id="cancelAssign">取消</button>
        <button class="btn primary" id="confirmAssign">✅ 确认分配</button>
      </div>
    </div>
  </div>

      function getCurrentFloor() {
        if (!appData || appData.floors.length === 0) return null;
        if (appData.currentFloorIndex >= appData.floors.length) appData.currentFloorIndex = 0;
        return appData.floors[appData.currentFloorIndex];
      }

      function getCurrentRoom() {
        const floor = getCurrentFloor();
        if (!floor || floor.rooms.length === 0) return null;
        if (appData.currentRoomIndex >= floor.rooms.length) appData.currentRoomIndex = 0;
        return floor.rooms[appData.currentRoomIndex];
      }

      function findFurnitureRef(furnId) {
        if (!appData) return null;
        for (const floor of appData.floors) {
          for (const room of floor.rooms) {
            const found = room.furniture.find(f => f.id === furnId);
            if (found) return found;
          }
        }
        return null;
      }

      function generateId(prefix = 'id') {
        return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 7);
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      function adjustColor(hex, amount) {
        if (!hex || !hex.startsWith('#')) return '#b8a07a';
        let r = parseInt(hex.slice(1,3), 16);
        let g = parseInt(hex.slice(3,5), 16);
        let b = parseInt(hex.slice(5,7), 16);
        r = Math.min(255, Math.max(0, r + amount));
        g = Math.min(255, Math.max(0, g + amount));
        b = Math.min(255, Math.max(0, b + amount));
        return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
      }

      function getTotalItems(furn) {
        return (furn.layers || []).reduce((sum, l) => sum + (l.items || []).length, 0);
      }

      // ============ Supabase 同步 ============
      function setSyncStatus(status) {
        syncDot.className = 'sync-dot ' + status;
      }

      async function loadFromCloud() {
        setSyncStatus('saving');
        try {
          const { data, error } = await supabase
            .from('storage_data')
            .select('app_data')
            .eq('id', DATA_ID)
            .single();

          if (error && error.code !== 'PGRST116') {
            console.error('加载失败:', error);
            setSyncStatus('error');
            return null;
          }

          if (data && data.app_data) {
            const parsed = typeof data.app_data === 'string' ? JSON.parse(data.app_data) : data.app_data;
            setSyncStatus('');
            return parsed;
          }

          setSyncStatus('');
          return null;
        } catch (e) {
          console.error('加载异常:', e);
          setSyncStatus('error');
          return null;
        }
      }

      async function saveToCloud() {
        if (!appData) return;
        setSyncStatus('saving');
        try {
          const jsonStr = JSON.stringify(appData);
          const { error } = await supabase
            .from('storage_data')
            .upsert({
              id: DATA_ID,
              password_hash: PASSWORD_HASH,
              app_data: jsonStr
            }, { onConflict: 'id' });

          if (error) {
            console.error('保存失败:', error);
            setSyncStatus('error');
          } else {
            setSyncStatus('');
          }
        } catch (e) {
          console.error('保存异常:', e);
          setSyncStatus('error');
        }
      }

      // 防抖保存
      let saveTimeout = null;
      function debouncedSave() {
        if (saveTimeout) clearTimeout(saveTimeout);
        setSyncStatus('saving');
        saveTimeout = setTimeout(() => saveToCloud(), 500);
      }

      // ============ 登录 ============
      async function handleLogin() {
        const inputPwd = passwordInput.value.trim();
        if (inputPwd !== PASSWORD_HASH) {
          loginError.style.display = 'block';
          passwordInput.value = '';
          passwordInput.focus();
          return;
        }

        loginError.style.display = 'none';
        loginStatus.textContent = '⏳ 正在从云端加载数据...';

        // 先尝试从云端加载
        const cloudData = await loadFromCloud();

        if (cloudData) {
          appData = cloudData;
          loginStatus.textContent = '✅ 已从云端同步数据';
        } else {
          // 检查本地是否有缓存
          const localData = localStorage.getItem('home_storage_local_backup');
          if (localData) {
            try {
              appData = JSON.parse(localData);
              loginStatus.textContent = '⚠️ 云端无数据，使用本地缓存';
              // 把本地数据推送到云端
              setTimeout(() => saveToCloud(), 500);
            } catch (e) {
              appData = getDefaultData();
              loginStatus.textContent = '🆕 首次使用，已创建默认数据';
              setTimeout(() => saveToCloud(), 500);
            }
          } else {
            appData = getDefaultData();
            loginStatus.textContent = '🆕 首次使用，已创建默认数据';
            setTimeout(() => saveToCloud(), 500);
          }
        }

        // 显示主界面
        setTimeout(() => {
          loginOverlay.style.display = 'none';
          topBar.style.display = 'flex';
          roomBar.style.display = 'flex';
          mainArea.style.display = 'flex';
          contextHint.style.display = 'block';
          updatePanelTabUI();
          refreshAll();
        }, 600);
      }

      // ============ 导出/导入（保留作为备份） ============
      function exportData() {
        if (!appData) return;
        const blob = new Blob([JSON.stringify(appData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '家人物品地图_备份_' + new Date().toISOString().slice(0,10) + '.json';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function importData(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.floors && Array.isArray(data.floors)) {
              if (confirm('导入将覆盖当前数据，继续？')) {
                data.floors.forEach(floor => {
                  floor.rooms.forEach(room => {
                    room.furniture.forEach(furn => {
                      if (!furn.layers || !Array.isArray(furn.layers)) {
                        furn.layers = [{ id: generateId('layer'), name: '抽屉', items: furn.items || [] }];
                        delete furn.items;
                      }
                    });
                  });
                });
                if (!data.pendingItems) data.pendingItems = [];
                if (data.currentRoomIndex === undefined) data.currentRoomIndex = 0;
                appData = data;
                selectedFurnitureId = null; selectedLayerIndex = 0; currentPanel = 'items';
                updatePanelTabUI();
                refreshAll();
                debouncedSave();
                alert('导入成功！');
              }
            } else { alert('格式错误'); }
          } catch (err) { alert('解析失败'); }
        };
        reader.readAsText(file);
      }

      function renderFurniture(furn) {
        const canvasInner = document.getElementById('canvasInner');

        el.className = 'furniture' + (selectedFurnitureId === furn.id ? ' open' : '');

        el.style.width = furn.width + 'px';
        el.style.height = furn.height + 'px';
        el.style.backgroundColor = furn.color || '#fdfaf5';
        const layers = furn.layers || [];
        let indicators = '';
        layers.forEach(l => {
          indicators += `<div class="furniture-layer-indicator">${escapeHtml(l.name)} · ${(l.items||[]).length}件</div>`;
        });
        el.innerHTML = `
          <div class="furniture-header" style="background:${furn.color||'#fdfaf5'}">
            <span><span class="color-dot-sm" style="background:${adjustColor(furn.color,-30)};"></span>${escapeHtml(furn.name)}</span>
            <div style="display:flex;align-items:center;"><span class="drawer-handle">⫶</span><button class="delete-furniture">✕</button></div>
          </div>
          <div class="furniture-body">${indicators}</div>
          <div class="resize-handle"></div>
        `;
        el.querySelector('.delete-furniture').addEventListener('click', (e) => {
          e.stopPropagation();
          const room = getCurrentRoom();
          if (!room) return;
          if (confirm('删除「' + furn.name + '」？')) {
            room.furniture = room.furniture.filter(f => f.id !== furn.id);
            if (selectedFurnitureId === furn.id) { selectedFurnitureId = null; selectedLayerIndex = 0; }
            refreshAll();
            debouncedSave();
          }
        });
        el.addEventListener('click', (e) => {
          if (e.target.closest('.delete-furniture') || e.target.closest('.resize-handle')) return;
          if (selectedFurnitureId === furn.id) {
            selectedFurnitureId = null; selectedLayerIndex = 0;
          } else {
            selectedFurnitureId = furn.id; selectedLayerIndex = 0;
            if (currentPanel === 'pending') { currentPanel = 'items'; updatePanelTabUI(); }
          }
          refreshAll();
        });
        el.addEventListener('dblclick', (e) => {
          if (e.target.closest('.resize-handle')) return;
          e.stopPropagation();
          editFurnitureDialog(furn);
        });
        makeDraggable(el, furn);
        makeResizable(el, furn, el.querySelector('.resize-handle'));
        canvasInner.appendChild(el);

      function editFurnitureDialog(furn) {
        const newName = prompt('名称：', furn.name);
        if (newName !== null && newName.trim()) furn.name = newName.trim();
        const newColor = prompt('颜色 (#xxxxxx)：', furn.color);
        if (newColor && /^#[0-9A-Fa-f]{6}$/.test(newColor.trim())) furn.color = newColor.trim();
        const layers = furn.layers || [];
        const newCount = prompt('层数（当前' + layers.length + '层）：', layers.length);
        if (newCount !== null) {
          const count = parseInt(newCount);
          if (!isNaN(count) && count > 0 && count <= 10) {
            if (count > layers.length) {
              for (let i = layers.length; i < count; i++) layers.push({ id: generateId('layer'), name: '第'+(i+1)+'层', items: [] });
            } else if (count < layers.length) {
              const removed = layers.splice(count);
              if (layers.length > 0) removed.forEach(rl => layers[layers.length-1].items.push(...rl.items));
            }
            if (layers.length === 1) layers[0].name = '抽屉';
            else layers.forEach((l, i) => { if (l.name.startsWith('第') || l.name === '抽屉') l.name = '第'+(i+1)+'层'; });
            furn.layers = layers;
          }
        }
        if (selectedLayerIndex >= (furn.layers||[]).length) selectedLayerIndex = 0;
        refreshAll();
        debouncedSave();
      }

      function makeDraggable(element, obj) {
        const header = element.querySelector('.furniture-header');
        if (!header) return;
        header.addEventListener('mousedown', (e) => {
          if (e.target.closest('button')) return;
          e.preventDefault();
          const sx = e.clientX, sy = e.clientY, ix = obj.x, iy = obj.y;
          function mm(e) {
            obj.x = Math.max(0, Math.round(ix + e.clientX - sx));
            obj.y = Math.max(0, Math.round(iy + e.clientY - sy));
            element.style.left = obj.x + 'px';
            element.style.top = obj.y + 'px';
          }
          function mu() {
            document.removeEventListener('mousemove', mm);
            document.removeEventListener('mouseup', mu);
            debouncedSave();
          }
          document.addEventListener('mousemove', mm);
          document.addEventListener('mouseup', mu);
        });
      }

      function makeResizable(element, obj, handle) {
        handle.addEventListener('mousedown', (e) => {
          e.preventDefault();
          e.stopPropagation();
          const sx = e.clientX, sy = e.clientY;
          const iw = obj.width, ih = obj.height;
          function mm(e) {
            obj.width = Math.max(70, Math.round(iw + e.clientX - sx));
            obj.height = Math.max(50, Math.round(ih + e.clientY - sy));
            element.style.width = obj.width + 'px';
            element.style.height = obj.height + 'px';
          }
          function mu() {
            document.removeEventListener('mousemove', mm);
            document.removeEventListener('mouseup', mu);
            debouncedSave();
          }
          document.addEventListener('mousemove', mm);
          document.addEventListener('mouseup', mu);
        });
      }

      function updateAssignRoomOptions() {
        const fi = parseInt(document.getElementById('assignFloor').value);
        const rooms = (appData.floors[fi] && appData.floors[fi].rooms) ? appData.floors[fi].rooms : [];
        document.getElementById('assignRoom').innerHTML = rooms.map((r, i) => `<option value="${i}">${r.name}</option>`).join('');

      function updateAssignFurnitureOptions() {
        const fi = parseInt(document.getElementById('assignFloor').value);
        const ri = parseInt(document.getElementById('assignRoom').value);
        const furn = appData.floors[fi]?.rooms[ri]?.furniture || [];
        document.getElementById('assignFurniture').innerHTML = furn.map((f, i) => `<option value="${i}">${f.name}</option>`).join('');
        updateAssignLayerOptions();
      }

      function updateAssignLayerOptions() {
        const fi = parseInt(document.getElementById('assignFloor').value);
        const ri = parseInt(document.getElementById('assignRoom').value);
        const furnIdx = parseInt(document.getElementById('assignFurniture').value);
        const layers = appData.floors[fi]?.rooms[ri]?.furniture[furnIdx]?.layers || [];
        document.getElementById('assignLayer').innerHTML = layers.map((l, i) => `<option value="${i}">${l.name}</option>`).join('');
      }

      function confirmAssign() {
        if (!pendingItemToAssign) return;
        const fi = parseInt(document.getElementById('assignFloor').value);
        const ri = parseInt(document.getElementById('assignRoom').value);
        const furnIdx = parseInt(document.getElementById('assignFurniture').value);
        const li = parseInt(document.getElementById('assignLayer').value);
        const item = appData.pendingItems.find(p => p.id === pendingItemToAssign);
        if (!item) return;
        const targetLayer = appData.floors[fi]?.rooms[ri]?.furniture[furnIdx]?.layers[li];
        if (!targetLayer) { alert('目标位置无效'); return; }
        targetLayer.items.push({ id: generateId('item'), name: item.name, note: item.note, img: item.img || '' });
        appData.pendingItems = appData.pendingItems.filter(p => p.id !== pendingItemToAssign);
        pendingItemToAssign = null;
        document.getElementById('assignModal').style.display = 'none';
        selectedFurnitureId = appData.floors[fi].rooms[ri].furniture[furnIdx].id;
        selectedLayerIndex = li;
        currentPanel = 'items';
        updatePanelTabUI();
        refreshAll();
        debouncedSave();
        setTimeout(() => alert('✅ 已分配！'), 200);
      }

      // ============ 物品面板 ============
      function renderPendingPanel() {
        const container = document.getElementById('itemListContainer');
        const items = appData.pendingItems || [];
        let html = '<div class="drawer-title">📥 待处理物品 (' + items.length + '件)</div>';
        if (items.length === 0) {
          html += '<div class="empty-state" style="margin-top:30px;">🎉 没有待处理物品</div>';
        } else {
          items.forEach(item => {
            html += `
              <div class="item-card pending">
                <div class="item-img">${item.img ? `<img src="${item.img}" style="width:100%;height:100%;object-fit:cover;">` : '📦'}</div>
                <div class="item-info"><div class="item-name">${escapeHtml(item.name)}</div><div class="item-note">${escapeHtml(item.note||'')}</div></div>
                <div class="item-actions">
                  <button class="icon-btn assign-btn" data-pendid="${item.id}" title="分配">📌</button>
                  <button class="icon-btn delete-pending" data-pendid="${item.id}" title="删除">🗑</button>
                </div>
              </div>`;
          });
          html += `
            <div class="add-item-form">
              <input type="text" id="newPendingName" placeholder="物品名称*" />
              <input type="text" id="newPendingNote" placeholder="备注" />
              <div class="form-row">
                <input type="file" id="newPendingImg" accept="image/*" style="display:none;" />
                <button class="btn" id="uploadPendingImgBtn">🖼️</button>
                <button class="btn accent" id="addPendingItemBtn">➕ 添加</button>
              </div>
              <span id="pendingImgFileName" style="font-size:0.65rem;color:#9b8b75;"></span>
            </div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.assign-btn').forEach(b => b.onclick = () => openAssignModal(b.dataset.pendid));
        document.querySelectorAll('.delete-pending').forEach(b => b.onclick = () => deletePendingItem(b.dataset.pendid));
        const addBtn = document.getElementById('addPendingItemBtn');
        if (addBtn) {
          addBtn.onclick = () => {
            const name = document.getElementById('newPendingName')?.value.trim();
            if (!name) { alert('请输入名称'); return; }
            const note = document.getElementById('newPendingNote')?.value.trim() || '';
            const file = document.getElementById('newPendingImg')?.files[0];
            if (file) {
              const r = new FileReader();
              r.onload = e => { appData.pendingItems.push({ id: generateId('pend'), name, note, img: e.target.result }); refreshAll(); debouncedSave(); };
              r.readAsDataURL(file);
            } else {
              appData.pendingItems.push({ id: generateId('pend'), name, note, img: '' });
              refreshAll();
              debouncedSave();
            }
          };
        }
        document.getElementById('uploadPendingImgBtn')?.addEventListener('click', () => document.getElementById('newPendingImg').click());
        document.getElementById('newPendingImg')?.addEventListener('change', function() {
          if (this.files[0]) document.getElementById('pendingImgFileName').textContent = '已选: ' + this.files[0].name;
        });
      }

      function renderItemPanel() {
        const container = document.getElementById('itemListContainer');
        if (currentPanel === 'pending') { renderPendingPanel(); return; }
        if (!selectedFurnitureId) {
          container.innerHTML = '<div class="empty-state">🪑 点击柜子查看物品<br><br><a href="#" id="goPendingLink" style="color:#e0795c;">📥 查看待处理物品</a></div>';
          document.getElementById('goPendingLink')?.addEventListener('click', e => { e.preventDefault(); switchPanel('pending'); });
          return;
        }
        const furnRef = findFurnitureRef(selectedFurnitureId);
        if (!furnRef) { selectedFurnitureId = null; selectedLayerIndex = 0; renderItemPanel(); return; }
        const layers = furnRef.layers || [];
        if (selectedLayerIndex >= layers.length) selectedLayerIndex = 0;
        const currentLayer = layers[selectedLayerIndex];
        const items = currentLayer ? (currentLayer.items || []) : [];
        let roomName = '';
        for (const floor of appData.floors) {
          for (const room of floor.rooms) {
            if (room.furniture.some(f => f.id === selectedFurnitureId)) { roomName = room.name; break; }
          }
        }
        let html = `
          <div class="drawer-title">
            <span class="drawer-color-dot" style="background:${furnRef.color}"></span>
            ${escapeHtml(roomName)} / ${escapeHtml(furnRef.name)}
            <span class="drawer-path">${layers.length}层 · ${getTotalItems(furnRef)}件</span>
          </div>`;
        if (layers.length > 1) {
          html += '<div class="layer-tabs">';
          layers.forEach((l, i) => {
            html += `<span class="layer-tab${i===selectedLayerIndex?' active':''}" data-layer-idx="${i}">${escapeHtml(l.name)}<span class="item-count">(${(l.items||[]).length})</span></span>`;
          });
          html += '<span class="layer-tab" data-action="edit-layers" style="border-style:dashed;">⚙️</span></div>';
        }
        if (items.length === 0) {
          html += '<div style="color:#b9a98b;padding:16px;text-align:center;">' + (currentLayer?currentLayer.name:'') + '暂无物品</div>';
        } else {
          items.forEach(item => {
            html += `
              <div class="item-card">
                <div class="item-img">${item.img?`<img src="${item.img}" style="width:100%;height:100%;object-fit:cover;">`:'📦'}</div>
                <div class="item-info"><div class="item-name">${escapeHtml(item.name)}</div><div class="item-note">${escapeHtml(item.note||'')}</div></div>
                <div class="item-actions">
                  <button class="icon-btn edit-item" data-itemid="${item.id}">✎</button>
                  <button class="icon-btn delete-item" data-itemid="${item.id}">🗑</button>
                </div>
              </div>`;
          });
        }
        html += `
          <div class="add-item-form">
            <input type="text" id="newItemName" placeholder="物品名称*" />
            <input type="text" id="newItemNote" placeholder="备注" />
            <div class="form-row">
              <input type="file" id="newItemImg" accept="image/*" style="display:none;" />
              <button class="btn" id="uploadImgBtn">🖼️</button>
              <button class="btn primary" id="addItemBtn">➕ 添加到${escapeHtml(currentLayer?currentLayer.name:'')}</button>
            </div>
            <span id="imgFileName" style="font-size:0.65rem;color:#9b8b75;"></span>
          </div>`;
        container.innerHTML = html;

        document.querySelectorAll('.layer-tab[data-layer-idx]').forEach(t => {
          t.addEventListener('click', () => { selectedLayerIndex = parseInt(t.dataset.layerIdx); refreshAll(); });
        });
        document.querySelector('[data-action="edit-layers"]')?.addEventListener('click', () => editFurnitureDialog(furnRef));
        document.getElementById('addItemBtn')?.addEventListener('click', () => {
          const name = document.getElementById('newItemName')?.value.trim();
          if (!name) { alert('请输入名称'); return; }
          const note = document.getElementById('newItemNote')?.value.trim() || '';
          const file = document.getElementById('newItemImg')?.files[0];
          const addFn = (img) => { currentLayer.items.push({ id: generateId('item'), name, note, img }); refreshAll(); debouncedSave(); };
          if (file) { const r = new FileReader(); r.onload = e => addFn(e.target.result); r.readAsDataURL(file); }
          else addFn('');
        });
        document.getElementById('uploadImgBtn')?.addEventListener('click', () => document.getElementById('newItemImg').click());
        document.getElementById('newItemImg')?.addEventListener('change', function() {
          if (this.files[0]) document.getElementById('imgFileName').textContent = '已选: ' + this.files[0].name;
        });
        document.querySelectorAll('.delete-item').forEach(b => {
          b.onclick = () => { if(confirm('删除？')){ currentLayer.items = currentLayer.items.filter(i=>i.id!==b.dataset.itemid); refreshAll(); debouncedSave(); } };
        });
        document.querySelectorAll('.edit-item').forEach(b => {
          b.onclick = () => {
            const item = currentLayer.items.find(i=>i.id===b.dataset.itemid);
            if(!item) return;
            const nn = prompt('名称：', item.name); if(nn!==null&&nn.trim()) item.name = nn.trim();
            const nt = prompt('备注：', item.note||''); if(nt!==null) item.note = nt.trim();
            refreshAll();
            debouncedSave();
          };
        });
      }

      // ============ 搜索 ============
      function searchAll() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!q) return;
        let results = [];
        appData.floors.forEach((floor, fi) => {
          floor.rooms.forEach((room, ri) => {
            room.furniture.forEach(furn => {
              (furn.layers||[]).forEach((layer, li) => {
                (layer.items||[]).forEach(item => {
                  if (item.name.toLowerCase().includes(q) || (item.note&&item.note.toLowerCase().includes(q))) {
                    results.push({ type:'stored', floorIndex:fi, roomIndex:ri, floorName:floor.name, roomName:room.name, furn, layerIndex:li, layerName:layer.name, item });
                  }
                });
              });
            });
          });
        });
        (appData.pendingItems||[]).forEach(item => {
          if (item.name.toLowerCase().includes(q) || (item.note&&item.note.toLowerCase().includes(q))) {
            results.push({ type:'pending', item });
          }
        });
        if (results.length === 0) { alert('未找到「' + q + '」'); return; }
        const r = results[0];
        if (r.type === 'pending') {
          switchPanel('pending');
          setTimeout(() => alert(`找到 ${results.length} 个结果\n在待处理列表中`), 200);
        } else {
          appData.currentFloorIndex = r.floorIndex;
          appData.currentRoomIndex = r.roomIndex;
          selectedFurnitureId = r.furn.id;
          selectedLayerIndex = r.layerIndex;
          currentPanel = 'items';
          updatePanelTabUI();
          refreshAll();
          setTimeout(() => alert(`找到 ${results.length} 个结果\n已定位：${r.floorName} → ${r.roomName} → ${r.furn.name} → ${r.layerName}`), 200);
        }
      }

      // ============ 刷新 ============
      function refreshAll() {
        // 备份到本地
        if (appData) {
          localStorage.setItem('home_storage_local_backup', JSON.stringify(appData));
        }
        renderFloorTabs();
        renderRoomTabs();
        renderCanvas();
        if (currentPanel === 'pending') renderPendingPanel();
        else renderItemPanel();
        updatePanelTabUI();
      }

      // ============ 事件绑定 ============
      loginBtn.addEventListener('click', handleLogin);
      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });

      document.getElementById('addFloorBtn').addEventListener('click', addFloor);
      document.getElementById('addFurnitureBtn').addEventListener('click', addFurnitureToCurrentRoom);
      document.getElementById('addPendingBtn').addEventListener('click', addPendingItem);
      document.getElementById('searchBtn').addEventListener('click', searchAll);
      document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchAll(); });
      document.getElementById('exportBtn').addEventListener('click', exportData);
      document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
      document.getElementById('importFile').addEventListener('change', e => {
        if (e.target.files[0]) { importData(e.target.files[0]); e.target.value = ''; }
      });
      document.querySelectorAll('.panel-tab').forEach(t => t.addEventListener('click', () => switchPanel(t.dataset.panel)));
      document.getElementById('cancelAssign').addEventListener('click', () => {
        pendingItemToAssign = null;
        document.getElementById('assignModal').style.display = 'none';
      });
      document.getElementById('confirmAssign').addEventListener('click', confirmAssign);
      document.getElementById('assignModal').addEventListener('click', e => {
        if (e.target === document.getElementById('assignModal')) {
          pendingItemToAssign = null;
          document.getElementById('assignModal').style.display = 'none';
        }
      });
      document.getElementById('canvasArea').addEventListener('click', e => {
        if (e.target === document.getElementById('canvasArea') || e.target === document.getElementById('canvasInner')) {
          if (selectedFurnitureId !== null) { selectedFurnitureId = null; selectedLayerIndex = 0; refreshAll(); }
        }
      });
    })();
  </script>
</body>
</html>
